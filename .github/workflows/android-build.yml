name: Android CI

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build Release APK
        run: ./gradlew assembleRelease --no-daemon

      - name: Sign APK
        run: |
          apksigner sign \
            --ks .signing/release.jks \
            --ks-key-alias $SIGNING_ALIAS \
            --ks-pass pass:$SIGNING_STORE_PASS \
            --key-pass pass:$SIGNING_KEY_PASS \
            app/build/outputs/apk/release/app-release-unsigned.apk
        env:
          SIGNING_ALIAS: ${{ vars.SIGNING_ALIAS }}
          SIGNING_STORE_PASS: ${{ vars.SIGNING_STORE_PASS }}
          SIGNING_KEY_PASS: ${{ vars.SIGNING_KEY_PASS }}

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-apk-${{ github.run_number }}
          path: app/build/outputs/apk/release/
          retention-days: 14
